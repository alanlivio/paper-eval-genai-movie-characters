name: Deploy site to gh-pages Branch

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-branch"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build latex
        uses: xu-cheng/texlive-action@v3
        with:
          scheme: full
          run: make -C website latex

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: make -C website deps

      - name: Build website
        run: make -C website build

      - name: Deploy to gh-pages Branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/site
          branch: gh-pages
